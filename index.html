<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 アメダスリアルタイム同期（CORS完全突破版）</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: #ffffff; font-family: sans-serif; overflow: hidden;
        }
        .widget-box {
            width: 100vw; height: 100vh; box-sizing: border-box;
            padding: 2vh 3vw; display: flex; flex-direction: column; justify-content: space-between;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #edf2f7; height: 10vh; }
        .header h1 { margin: 0; font-size: 4.5vh; color: #2d3748; font-weight: 900; }
        .header .sub { font-size: 2vh; color: #718096; font-weight: bold; }
        .wbgt-section {
            background: #718096; color: white; border-radius: 24px; text-align: center;
            height: 60vh; display: flex; flex-direction: column; justify-content: space-between; padding: 2vh 0;
        }
        .wbgt-label { font-size: 3.5vh; font-weight: bold; margin: 0; }
        .wbgt-display-area { display: flex; justify-content: center; align-items: center; height: 42vh; }
        #wbgt-num { font-size: 32vh !important; font-weight: 900; line-height: 0.9; letter-spacing: -6px; }
        .wbgt-unit { font-size: 9vh; font-weight: 900; align-self: flex-end; margin-bottom: 5vh; margin-left: 10px; }
        .wbgt-status { font-size: 5vh; font-weight: 900; background: rgba(0,0,0,0.25); padding: 0.5vh 8vw; border-radius: 50px; align-self: center; }
        .weather-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2vw; height: 18vh; }
        .grid-item { background: #f7fafc; border: 4px solid #e2e8f0; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .grid-label { font-size: 2.5vh; color: #4a5568; font-weight: bold; }
        .grid-value { font-size: 5vh; font-weight: 900; color: #1a202c; }
        .footer { font-size: 2vh; color: #a0aec0; text-align: center; border-top: 3px solid #edf2f7; height: 4vh; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山アメダス（観測所コード：65042 現況直結版）</div>
        </div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">アメダス実況連動 暑さ指数</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">データ反映待ち...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在の気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在の湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
    </div>

    <div class="footer" id="update-time">GitHub Actions アメダス実況同期システム</div>
</div>

<script>
const AMEDAS_JSON_URL = "./amedas_now.json";
const WAKAYAMA_AMEDAS_CODE = "65042"; // 和歌山アメダス観測所の固有コード

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

// 気温と湿度からWBGT（暑さ指数）を推定する標準簡易公式
function calcWbgt(temp, humidity) {
    return 0.725 * temp + 0.0368 * humidity + 0.00315 * temp * humidity - 3.0;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // Actionsが5分ごとに更新してくれているJSONを取得
        const response = await fetch(`${AMEDAS_JSON_URL}?_=${Date.now()}`);
        if (!response.ok) throw new Error();
        const amedasData = await response.json();

        // 和歌山(65042)の今のピンポイント実況データを抽出
        const targetData = amedasData[WAKAYAMA_AMEDAS_CODE];
        if (!targetData) throw new Error("和歌山アメダスのデータが見つかりません");

        // 気象庁アメダスの生数値（気温は配列[0]、湿度は配列[0]に格納されています）
        const curTemp = targetData.temp ? parseFloat(targetData.temp[0]) : null;
        const curHumidity = targetData.humidity ? parseFloat(targetData.humidity[0]) : null;

        if (curTemp !== null && curHumidity !== null) {
            // 画面の「現在の気温」「現在の湿度」をお送りいただいたURLの数値と完全同期
            document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
            document.getElementById('cur-humidity').innerText = `${Math.round(curHumidity)}%`;

            // 本物の実況値からリアルタイムに現在のWBGTを算出
            const curWbgt = calcWbgt(curTemp, curHumidity).toFixed(1);
            document.getElementById('wbgt-num').innerText = curWbgt;

            const level = getWbgtLevel(curWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;

            const now = new Date();
            document.getElementById('time-label').innerText = `和歌山アメダス現況実況値`;
            document.getElementById('update-time').innerText = `アメダス同期完了: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
        } else {
            throw new Error("データが空です");
        }

    } catch (e) {
        statusEl.innerText = "データ反映待ち...";
        document.getElementById('wbgt-card').style.backgroundColor = "#718096";
        console.error("アメダス解析エラー:", e);
    }
}

// 起動
updateDashboard();
// 3分ごとにSTB側でファイル更新をチェック
setInterval(updateDashboard, 180000);
</script>

</body>
</html>
