<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 気象庁アメダス完全同期ダッシュボード</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }

        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山アメダス実況（気象庁公式・100%リアルタイム同期版）</div>
        </div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">アメダス連動 暑さ指数</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">アメダス通信中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在の気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在の湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
    </div>

    <div class="footer" id="update-time">気象庁アメダス直接同期システム</div>
</div>

<script>
// 和歌山地方気象台（アメダス観測所コード: 65046）
const AMEDAS_STATION = "65046"; 

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

function calcWbgt(temp, humidity) {
    return 0.725 * temp + 0.0368 * humidity + 0.00315 * temp * humidity - 3.0;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // 1. 気象庁のアメダス最終発表時刻を取得（CORS制限なし）
        const timeRes = await fetch("https://www.jma.go.jp/bosai/amedas/data/latest_time.json");
        if (!timeRes.ok) throw new Error("発表時刻の取得失敗");
        const timeJson = await timeRes.json(); // 例: "2024-07-10T14:00:00+09:00"

        // 2. 日時文字列を気象庁のURL形式（YYYYMMDDHH0000）に確実に変換する（バグを修正）
        // ハイフン、コロン、T、プラス、以降の文字をすべて削り、数字のみの頭12文字を取り出して秒（00）を付与
        const cleanTime = timeJson.replace(/[^0-9]/g, ""); // "202407101400000900" などの数字のみに
        const latestTimeStr = cleanTime.substring(0, 10) + "0000"; // 先頭の年月日時（10桁）+ "0000" -> "20240710140000"

        // 3. アメダス一斉配信JSONをダイレクトに取得（CORS制限なし）
        const dataUrl = `https://www.jma.go.jp/bosai/amedas/data/map/${latestTimeStr}.json`;
        const dataRes = await fetch(dataUrl);
        if (!dataRes.ok) throw new Error("アメダスデータ取得失敗");
        const amedasData = await dataRes.json();

        // 4. 和歌山観測所のデータを抽出
        const stationData = amedasData[AMEDAS_STATION];
        if (!stationData) throw new Error("和歌山観測所のデータが見つかりません");

        // 気象庁アメダスの配列データ（[0]番目に数値が入っています）
        const curTemp = parseFloat(stationData.temperature[0]);
        const curHumidity = parseFloat(stationData.humidity[0]);

        if (!isNaN(curTemp) && !isNaN(curHumidity)) {
            // 気象庁ホームページのアメダス実況値と完全にシンクロ
            document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
            document.getElementById('cur-humidity').innerText = `${Math.round(curHumidity)}%`;

            // 本物のリアルタイム実況値からWBGTを正確に計算
            const curWbgt = calcWbgt(curTemp, curHumidity).toFixed(1);
            
            const numEl = document.getElementById('wbgt-num');
            numEl.innerText = curWbgt;
            numEl.style.setProperty('font-size', '32vh', 'important');

            // 危険度レベルに応じた背景色の変更
            const level = getWbgtLevel(curWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;

            // タイムスタンプから発表時刻を正しく表示
            const displayTime = new Date(timeJson);
            document.getElementById('time-label').innerText = `気象庁アメダス実況（${displayTime.getHours()}:00時点）`;
            
            const rightNow = new Date();
            document.getElementById('update-time').innerText = `気象庁アメダス完全同期中: ${rightNow.getHours()}:${String(rightNow.getMinutes()).padStart(2,'0')}`;
        } else {
            throw new Error("数値パースエラー");
        }

    } catch (e) {
        statusEl.innerText = "アメダスデータ読込エラー";
        console.error("同期失敗詳細:", e);
    }
}

// 起動
updateDashboard();
// アメダス発表に合わせて5分ごとに最新情報を自動追尾
setInterval(updateDashboard, 300000);
</script>

</body>
</html>
