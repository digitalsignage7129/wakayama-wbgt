<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 WBGT＆気象情報リアルタイムサイネージ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 2vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }

        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-size: 32vh !important;
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 熱中症対策ポータル</h1>
            <div class="sub">和歌山（環境省WBGT ＆ 気象庁アメダス完全リアルタイム同期）</div>
        </div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">環境省発表 暑さ指数（WBGT）</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">データ反映待ち...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在の気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在の湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
    </div>

    <div class="footer" id="update-time">GitHub Actions ハイブリッド同期システム</div>
</div>

<script>
// Actionsが生成する合体データJSONを指定
const DATA_URL = "./wbgt_combined.json";

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // キャッシュを完全にバイパスして最新JSONを取得
        const response = await fetch(`${DATA_URL}?_=${Date.now()}`);
        if (!response.ok) throw new Error("JSON読み込み失敗");
        const data = await response.json();

        // 各数値をパース
        const curWbgt = parseFloat(data.wbgt);
        const curTemp = parseFloat(data.temp);
        const curHumidity = parseFloat(data.humidity);

        // 環境省の本物WBGTを画面にセット
        if (!isNaN(curWbgt)) {
            document.getElementById('wbgt-num').innerText = curWbgt.toFixed(1);
            
            // 警戒レベルに応じた色替えとステータス更新
            const level = getWbgtLevel(curWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;
        } else {
            throw new Error("WBGTデータが不正です");
        }

        // 気象庁の本物アメダス数値を画面にセット
        document.getElementById('cur-temp').innerText = (curTemp !== null && !isNaN(curTemp)) ? `${curTemp.toFixed(1)}℃` : "--.-℃";
        document.getElementById('cur-humidity').innerText = (curHumidity !== null && !isNaN(curHumidity)) ? `${Math.round(curHumidity)}%` : "--%";

        // 最終同期時間の表示更新
        const now = new Date();
        document.getElementById('update-time').innerText = `データ最終同期: ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

    } catch (e) {
        statusEl.innerText = "データ同期待ち";
        document.getElementById('wbgt-card').style.backgroundColor = "#718096";
        console.error("STBデータ反映エラー:", e);
    }
}

// 起動
updateDashboard();
// 3分（180000ms）ごとにリポジトリの最新JSONをチェック
setInterval(updateDashboard, 180000);
</script>

</body>
</html>
