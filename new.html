<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 WBGT・気象ダッシュボード</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }
        .weather-icon-txt {
            font-size: 5.5vh;
            font-weight: 900;
            color: #3182ce;
        }

        /* 暑さ指数エリア */
        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        /* 気象グリッド */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 4.5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        /* フッター */
        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山（環境省WBGT / 気象庁アメダス実測）</div>
        </div>
        <div id="weather-text" class="weather-icon-txt">LIVE</div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">環境省 暑さ指数 (WBGT)</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">読込中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">アメダス気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
        <div class="grid-item"><div class="grid-label">風速</div><div class="grid-value" id="cur-wind">--.-m/s</div></div>
    </div>

    <div class="footer" id="update-time">データ同期中...</div>
</div>

<script>
// 和歌山のアメダス地点コード（近畿地方 -> 和歌山県 -> 和歌山）
const JMA_WAKAYAMA_ID = "65036"; 

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (isNaN(v)) return { color: '#718096', text: '--' };
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

// 安定したパブリックCORSプロキシを経由してJSON化する関数
async function fetchJsonViaProxy(url) {
    // 複数のプロキシフォールバック（片方が落ちていても動くようにする）
    const proxies = [
        (target) => `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
        (target) => `https://corsproxy.io/?${encodeURIComponent(target)}`
    ];
    
    let lastError = null;
    for (const proxyFn of proxies) {
        try {
            const res = await fetch(proxyFn(url));
            if (!res.ok) continue;
            const resJson = await res.json();
            // AllOriginsの場合は .contents、corsproxy.ioの場合は直接データが入るケースをハンドリング
            return typeof resJson.contents === 'string' ? JSON.parse(resJson.contents) : (resJson.contents || resJson);
        } catch (e) {
            lastError = e;
        }
    }
    throw lastError || new Error("プロキシエラー");
}

// 1. 環境省のWBGT予測データを取得
async function fetchEnvWbgt() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // 環境省が提供する時系列データのJSON形式URL（和歌山: 65036）
        // ※CSVではなくJSONを狙い撃ちすることでパースエラーを防止
        const targetUrl = "https://www.wbgt.env.go.jp/wbgt_data/json/65036.json";
        const data = await fetchJsonViaProxy(targetUrl);
        
        // 直近の予測データを探索
        const now = new Date();
        let minDiff = Infinity;
        let latestWbgt = null;
        let targetTimeStr = "";

        // 本日・明日・明後日のデータ配列を結合してループ
        const allData = [].concat(data.features[0].properties.wbgt_daily.today || [], data.features[0].properties.wbgt_daily.tomorrow || []);
        
        allData.forEach(item => {
            // item.time 形式: "2026-07-10 12:00:00"
            const itemDate = new Date(item.time.replace(/-/g, '/')); 
            const diff = Math.abs(now - itemDate);
            if (diff < minDiff) {
                minDiff = diff;
                latestWbgt = parseFloat(item.wbgt).toFixed(1);
                targetTimeStr = `${itemDate.getHours()}:00`;
            }
        });

        if (latestWbgt) {
            const numEl = document.getElementById('wbgt-num');
            numEl.innerText = latestWbgt;
            numEl.style.setProperty('font-size', '32vh', 'important');

            const level = getWbgtLevel(latestWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;
            document.getElementById('time-label').innerText = `環境省 WBGT（${targetTimeStr} 時点）`;
        }
    } catch (e) {
        statusEl.innerText = "データ遅延発生中";
        console.error("WBGT取得エラー:", e);
    }
}

// 2. 気象庁の最新アメダス実測データを取得
async function fetchJmaAmedas() {
    try {
        // 気象庁公式のアメダス最新更新時刻ファイル
        const timeUrl = "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt";
        const timeRes = await fetch(`https://corsproxy.io/?${encodeURIComponent(timeUrl)}`);
        if (!timeRes.ok) throw new Error();
        const rawTimeText = await timeRes.text();
        
        const dateObj = new Date(rawTimeText.trim());
        const Y = dateObj.getFullYear();
        const M = String(dateObj.getMonth() + 1).padStart(2, '0');
        const D = String(dateObj.getDate()).padStart(2, '0');
        const h = String(dateObj.getHours()).padStart(2, '0');
        const m = String(dateObj.getMinutes()).padStart(2, '0');
        const timeStr = `${Y}${M}${D}${h}${m}00`;

        // 全アメダス地点のJSON
        const dataUrl = `https://www.jma.go.jp/bosai/amedas/data/map/${timeStr}.json`;
        const amedasData = await fetchJsonViaProxy(dataUrl);

        const wData = amedasData[JMA_WAKAYAMA_ID];
        if (wData) {
            if (wData.temp) document.getElementById('cur-temp').innerText = `${wData.temp[0].toFixed(1)}℃`;
            if (wData.humidity) document.getElementById('cur-humidity').innerText = `${wData.humidity[0]}%`;
            if (wData.wind) document.getElementById('cur-wind').innerText = `${wData.wind[0].toFixed(1)}m/s`;

            document.getElementById('update-time').innerText = `気象庁公式アメダス同期: ${Y}/${parseInt(M)}/${parseInt(D)} ${h}:${m}`;
        }
    } catch (e) {
        document.getElementById('update-time').innerText = "気象庁データ取得待機中...";
        console.error("気象庁データ取得エラー:", e);
    }
}

function updateDashboard() {
    fetchEnvWbgt();
    fetchJmaAmedas();
}

// 初回起動と5分おきの自動更新
updateDashboard();
setInterval(updateDashboard, 300000);
</script>

</body>
</html>
