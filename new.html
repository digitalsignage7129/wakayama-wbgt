<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 アメダスリアルタイム・WBGTダッシュボード</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }
        .weather-icon-txt {
            font-size: 5.5vh;
            font-weight: 900;
            color: #3182ce;
        }

        /* 暑さ指数エリア */
        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        /* 気象グリッド */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 4.5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        /* フッター */
        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山（気象庁アメダス実測 連動版）</div>
        </div>
        <div id="weather-text" class="weather-icon-txt">LIVE</div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">アメダス実測ベース 暑さ指数</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">データ更新中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
        <div class="grid-item"><div class="grid-label">現在風速</div><div class="grid-value" id="cur-wind">--.-m/s</div></div>
    </div>

    <div class="footer" id="update-time">気象庁公式アメダス同期中...</div>
</div>

<script>
// 気象庁アメダス「和歌山」の地点コード
const JMA_WAKAYAMA_ID = "65036"; 

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

// 日本生気象学会による、気温と湿度から屋外WBGTを推定する高精度計算式
function calcWbgt(temp, humidity) {
    return 0.725 * temp + 0.0368 * humidity + 0.00315 * temp * humidity - 3.0;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // 1. 気象庁アメダスの最新更新時刻（10分ごとに更新されるファイル）を取得
        const timeUrl = "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt";
        const proxyTimeUrl = `https://corsproxy.io/?${encodeURIComponent(timeUrl)}`;
        
        const timeRes = await fetch(proxyTimeUrl);
        if (!timeRes.ok) throw new Error();
        const rawTimeText = await timeRes.text();
        
        // 2. 取得した時刻を気象庁のURL形式（YYYYMMDDHHMM00）に整形
        const dateObj = new Date(rawTimeText.trim());
        const Y = dateObj.getFullYear();
        const M = String(dateObj.getMonth() + 1).padStart(2, '0');
        const D = String(dateObj.getDate()).padStart(2, '0');
        const h = String(dateObj.getHours()).padStart(2, '0');
        const m = String(dateObj.getMinutes()).padStart(2, '0');
        const timeStr = `${Y}${M}${D}${h}${m}00`;

        // 3. その瞬間の全国アメダス実測値JSONを取得
        const dataUrl = `https://www.jma.go.jp/bosai/amedas/data/map/${timeStr}.json`;
        const proxyDataUrl = `https://corsproxy.io/?${encodeURIComponent(dataUrl)}`;
        
        const dataRes = await fetch(proxyDataUrl);
        if (!dataRes.ok) throw new Error();
        const amedasData = await dataRes.json();

        // 4. 和歌山地点（65036）の実測データを抽出
        const wData = amedasData[JMA_WAKAYAMA_ID];
        if (wData) {
            // 気象庁アメダスの生データ（配列の最初の要素が現在の数値）
            const curTemp = wData.temp ? wData.temp[0] : null;
            const curHumidity = wData.humidity ? wData.humidity[0] : null;
            const curWind = wData.wind ? wData.wind[0] : null;

            if (curTemp !== null && curHumidity !== null) {
                // 画面表示を更新
                document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
                document.getElementById('cur-humidity').innerText = `${Math.round(curHumidity)}%`;
                document.getElementById('cur-wind').innerText = `${curWind ? curWind.toFixed(1) : '--.-'}m/s`;

                // 完全に連動した実測値からWBGTを算出
                const curWbgt = calcWbgt(curTemp, curHumidity).toFixed(1);
                
                const numEl = document.getElementById('wbgt-num');
                numEl.innerText = curWbgt;
                numEl.style.setProperty('font-size', '32vh', 'important');

                const level = getWbgtLevel(curWbgt);
                document.getElementById('wbgt-card').style.backgroundColor = level.color;
                statusEl.innerText = level.text;

                document.getElementById('time-label').innerText = `現在（${h}:${m}実測値）の暑さ指数`;
                document.getElementById('update-time').innerText = `気象庁アメダスと完全同期: ${Y}/${parseInt(M)}/ ${parseInt(D)} ${h}:${m}`;
            } else {
                throw new Error("データが一部空っぽです");
            }
        }

    } catch (e) {
        statusEl.innerText = "アメダス接続待機中...";
        console.error("アメダスデータ同期エラー:", e);
    }
}

// 起動
updateDashboard();
// アメダスは10分ごとに更新されるため、600秒ごとに自動同期
setInterval(updateDashboard, 600000);
</script>

</body>
</html>
