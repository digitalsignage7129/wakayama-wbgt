<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 気象庁完全連動ダッシュボード</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }
        .weather-icon-txt {
            font-size: 5.5vh;
            font-weight: 900;
            color: #3182ce;
        }

        /* 暑さ指数エリア */
        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        /* 気象グリッド */
        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        /* フッター */
        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山市（気象庁公式HP画面 完全同期版）</div>
        </div>
        <div id="weather-text" class="weather-icon-txt">LIVE</div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">気象庁画面連動 暑さ指数</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">同期中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在の気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在の湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
    </div>

    <div class="footer" id="update-time">気象庁サイトデータと同期中...</div>
</div>

<script>
const WAKAYAMA_CITY_CODE = "3020100"; // 和歌山市コード

function getWeatherName(code) {
    const c = parseInt(code);
    if ([100, 101, 123, 130].includes(c)) return "☀️晴れ";
    if ([102, 104, 200, 201, 210, 270].includes(c)) return "⛅曇晴";
    if ([202, 203, 204, 208, 300].includes(c)) return "☁️曇り";
    if ([301, 302, 303, 350, 400].includes(c)) return "☔雨";
    return "☁️曇り";
}

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

// 日本生気象学会公式ベースのWBGT換算式
function calcWbgt(temp, humidity) {
    return 0.725 * temp + 0.0368 * humidity + 0.00315 * temp * humidity - 3.0;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // 気象庁の該当ページが「現在の実況天気・気温・湿度」を描画するために直接読み込んでいる公式JSON
        const targetUrl = `https://www.jma.go.jp/bosai/forecast/data/forecast/300000.json`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
        
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        // 3時間ごとの時系列（気温・湿度）が格納されている配列を取得
        const timeSeriesGroup = data[1].timeSeries;
        
        let times = [];
        let temps = [];
        let humidities = [];

        timeSeriesGroup.forEach(series => {
            if (series.areas[0].area.code === WAKAYAMA_CITY_CODE) {
                if (series.data.temperature) {
                    times = series.timeDefines;
                    temps = series.data.temperature;
                }
                if (series.data.humidity) {
                    humidities = series.data.humidity;
                }
            }
        });

        // 現在時刻に一番近い（＝今画面に表示されている）データのインデックスを特定
        const now = new Date();
        let targetIndex = 0;
        let minDiff = Infinity;

        for (let i = 0; i < times.length; i++) {
            const diff = Math.abs(now - new Date(times[i]));
            if (diff < minDiff) {
                minDiff = diff;
                targetIndex = i;
            }
        }

        // 気象庁のサイト画面に今出ている数値をピンポイントで抽出
        const curTemp = parseFloat(temps[targetIndex]);
        // 湿度が配列の範囲外（または予報にない時間）なら、直近の実況配列から安全に抽出
        let curHumidity = humidities[targetIndex] ? parseFloat(humidities[targetIndex]) : parseFloat(humidities[0]);

        if (!isNaN(curTemp) && !isNaN(curHumidity)) {
            // 1. 画面の数値を気象庁サイトと完全同期
            document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
            document.getElementById('cur-humidity').innerText = `${Math.round(curHumidity)}%`;

            // 2. その数値からWBGTを算出
            const curWbgt = calcWbgt(curTemp, curHumidity).toFixed(1);
            
            const numEl = document.getElementById('wbgt-num');
            numEl.innerText = curWbgt;
            numEl.style.setProperty('font-size', '32vh', 'important');

            // 天気アイコン（文字）の同期
            if (data[0] && data[0].timeSeries[0].areas[0].weatherCodes) {
                const code = data[0].timeSeries[0].areas[0].weatherCodes[0];
                document.getElementById('weather-text').innerText = getWeatherName(code);
            }

            const level = getWbgtLevel(curWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;

            const timeObj = new Date(times[targetIndex]);
            document.getElementById('time-label').innerText = `気象庁画面（${timeObj.getHours()}:00時点）の連動暑さ指数`;
            
            const rightNow = new Date();
            document.getElementById('update-time').innerText = `気象庁公式ページと100%同期中: ${rightNow.getHours()}:${String(rightNow.getMinutes()).padStart(2,'0')}`;
        }

    } catch (e) {
        statusEl.innerText = "データ同期エラー";
        console.error("同期失敗:", e);
    }
}

// 起動
updateDashboard();
// 5分ごとに気象庁の最新画面データと同期
setInterval(updateDashboard, 300000);
</script>

</body>
</html>
