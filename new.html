<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 気象庁公式ピンポイント連動</title>
    <style>
        /* 画面全体のスクロールを完全に禁止し、全画面表示にする */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
        }

        /* 上部ヘッダー（元々のダッシュボードのデザインを維持） */
        .header {
            padding: 1.5vh 3vw;
            background: #ffffff;
            border-bottom: 5px solid #edf2f7;
            height: 8vh;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            margin: 0;
            font-size: 3.5vh;
            color: #2d3748;
            font-weight: 900;
        }

        /* 気象庁のページを埋め込むコンテナ */
        .iframe-container {
            width: 100vw;
            height: 92vh; /* 残りの画面すべて */
            position: relative;
            overflow: hidden !important; /* スクロールバーを強制非表示 */
            background: #f4f5f6;
        }

        /* 気象庁のWebサイトを裏側で大きく広げ、
           和歌山市の天気情報の中心部分だけが画面にぴったり収まるように位置を固定（くり抜き）
        */
        .iframe-container iframe {
            position: absolute;
            top: -240px;    /* 上部のヘッダーやナビゲーションを隠す（環境に合わせて微調整してください） */
            left: 0;
            width: 100vw;
            height: calc(92vh + 240px);
            border: none;
            pointer-events: none; /* タブレット等で触って画面がズレるのを防ぐ（動かしたい場合は auto に） */
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <h1>和歌山市 気象庁公式リアルタイム画面</h1>
    </div>

    <div class="iframe-container">
        <iframe src="https://www.jma.go.jp/bosai/#pattern=forecast&area_type=class20s&area_code=3020100"></iframe>
    </div>
</div>

</body>
</html>
