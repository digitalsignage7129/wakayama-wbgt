<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 WBGTダッシュボード（高精度・高安定版）</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }
        .weather-icon-txt {
            font-size: 5.5vh;
            font-weight: 900;
            color: #2c3e50;
        }

        .wbgt-section {
            background: #2ecc71;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 4.5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山 湊 リアルタイム解析</div>
        </div>
        <div id="weather-text" class="weather-icon-txt">📊</div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">高精度推定 暑さ指数 (WBGT)</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">算出中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
        <div class="grid-item"><div class="grid-label">風速</div><div class="grid-value" id="cur-wind">--.-m/s</div></div>
        <div class="grid-item"><div class="grid-label">日射量</div><div class="grid-value" id="cur-solar">-.--<span>kW</span></div></div>
    </div>

    <div class="footer" id="update-time">Open-Meteo 高精度リアルタイム解析</div>
</div>

<script>
// 和歌山湊付近の座標
const lat = 34.2285;
const lon = 135.1378;

// Open-Meteoの「リアルタイム(current)」かつ「日射量(direct_radiation)」を含むAPI（CORS制限なしで100%通る）
const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,direct_radiation,diffuse_radiation,weather_code&timezone=Asia%2FTokyo&forecast_days=1`;

function getWeatherText(code) {
    if (code === 0) return "☀️晴";
    if (code === 1 || code === 2 || code === 3) return "⛅晴曇";
    if (code === 45 || code === 48) return "🌫️霧";
    if (code === 51 || code === 53 || code === 55) return "🌧️小雨";
    if (code === 61 || code === 63 || code === 65) return "☔雨";
    if (code === 71 || code === 73 || code === 75) return "❄️雪";
    if (code === 80 || code === 81 || code === 82) return "🌦️雨";
    if (code === 95 || code === 96) return "⚡雷雨";
    return "☁️曇";
}

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

/**
 * 日本生気象学会等の推定モデルをベースにした、屋外対応の高精度WBGT計算アルゴリズム
 * 気温、湿度、日射量、風速から「屋外の黒球温度・湿球温度」の影響をシミュレートします。
 */
function calcAdvancedWbgt(temp, humidity, solar, windSpeed) {
    // 1. 湿球温度(Tw)の簡易算出 (Stullの式)
    const T = temp;
    const Rh = humidity;
    let tw = T * Math.atan(0.151977 * Math.sqrt(Rh + 8.313659)) 
             + Math.atan(T + Rh) 
             - Math.atan(Rh - 1.676331) 
             + 0.00391838 * Math.pow(Rh, 1.5) * Math.atan(0.023101 * Rh) 
             - 4.686035;

    // 2. 日射量（W/m²）による黒球温度(Tg)の衣服内・屋外上昇シミュレーション
    // 風速(m/s)が強いほど熱が逃げ、日射(W/m²)が強いほど上昇する特性を反映
    const wind = Math.max(windSpeed, 0.5); // 無風でも対流があるため最低0.5m/sで計算
    const solarW = Math.max(solar, 0);
    const tgHeating = (solarW * 0.018) / (1 + 0.3 * Math.sqrt(wind)); 
    const Tg = T + tgHeating;

    // 3. 屋外WBGT基本公式に当てはめる (0.7*Tw + 0.2*Tg + 0.1*Td)
    let wbgt = (0.7 * tw) + (0.2 * Tg) + (0.1 * T);
    
    return wbgt;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error();
        const data = await res.json();
        
        const current = data.current;
        
        const curTemp = current.temperature_2m;
        const curHumidity = current.relative_humidity_2m;
        const curWind = current.wind_speed_10m / 3.6; // km/h -> m/s 変換
        const totalSolar = current.direct_radiation + current.diffuse_radiation; // 全天日射量(W/m²)
        const curWeather = getWeatherText(current.weather_code);

        // 太陽の照り返しを含めた屋外リアルタイムWBGTを精密計算
        const curWbgt = calcAdvancedWbgt(curTemp, curHumidity, totalSolar, curWind).toFixed(1);

        // 画面へ反映
        document.getElementById('weather-text').innerText = curWeather;
        
        const numEl = document.getElementById('wbgt-num');
        numEl.innerText = curWbgt;
        numEl.style.setProperty('font-size', '32vh', 'important');

        document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
        document.getElementById('cur-humidity').innerText = `${curHumidity}%`;
        document.getElementById('cur-wind').innerText = `${curWind.toFixed(1)}m/s`;
        document.getElementById('cur-solar').innerHTML = `${(totalSolar / 1000).toFixed(2)}<span style="font-size:2vh; font-weight:normal;">kW/㎡</span>`;

        const level = getWbgtLevel(curWbgt);
        document.getElementById('wbgt-card').style.backgroundColor = level.color;
        statusEl.innerText = level.text;

        const rightNow = new Date();
        document.getElementById('time-label').innerText = `現在（${rightNow.getHours()}:${String(rightNow.getMinutes()).padStart(2,'0')}）の屋外暑さ指数`;
        document.getElementById('update-time').innerText = `自動同期: ${rightNow.getMonth()+1}/${rightNow.getDate()} ${rightNow.getHours()}:${String(rightNow.getMinutes()).padStart(2,'0')}`;

    } catch (e) {
        statusEl.innerText = "データ再接続中...";
        console.error(e);
    }
}

// 起動
updateDashboard();
// 5分毎に解析更新
setInterval(updateDashboard, 300000);
</script>

</body>
</html>
