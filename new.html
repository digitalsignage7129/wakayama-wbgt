<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和歌山市 気象庁アメダス完全同期ダッシュボード</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden !important;
        }
        
        .widget-box {
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 1.5vh 3vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #edf2f7;
            height: 10vh;
        }
        .header h1 {
            margin: 0;
            font-size: 4.5vh;
            color: #2d3748;
            font-weight: 900;
            line-height: 1.1;
        }
        .header .sub {
            font-size: 2vh;
            color: #718096;
            font-weight: bold;
        }

        .wbgt-section {
            background: #718096;
            color: white;
            border-radius: 24px;
            text-align: center;
            height: 60vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2vh 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: background-color 0.5s ease;
        }
        .wbgt-label {
            font-size: 3.5vh;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1;
        }
        
        .wbgt-display-area {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 42vh;
            margin: 0;
            padding: 0;
        }

        #wbgt-num {
            font-weight: 900 !important;
            line-height: 0.9 !important;
            letter-spacing: -6px !important;
        }
        .wbgt-unit {
            font-size: 9vh !important;
            font-weight: 900 !important;
            margin-left: 10px;
            align-self: flex-end;
            margin-bottom: 5vh;
        }
        
        .wbgt-status {
            font-size: 5vh;
            font-weight: 900;
            background: rgba(0,0,0,0.25);
            padding: 0.4vh 8vw;
            border-radius: 50px;
            display: inline-block;
            align-self: center;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2vw;
            height: 18vh;
        }
        .grid-item {
            background: #f7fafc;
            border: 4px solid #e2e8f0;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }
        .grid-label {
            font-size: 2.5vh;
            color: #4a5568;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .grid-value {
            font-size: 5vh;
            font-weight: 900;
            color: #1a202c;
            line-height: 1;
        }

        .footer {
            font-size: 2vh;
            color: #a0aec0;
            text-align: center;
            border-top: 3px solid #edf2f7;
            height: 4vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="widget-box">
    <div class="header">
        <div>
            <h1>和歌山市 気象ポータル</h1>
            <div class="sub">和歌山アメダス実況（気象庁公式データ・ダイレクト同期版）</div>
        </div>
    </div>

    <div class="wbgt-section" id="wbgt-card">
        <div class="wbgt-label" id="time-label">アメダス連動 暑さ指数</div>
        <div class="wbgt-display-area">
            <span id="wbgt-num">--.-</span>
            <span class="wbgt-unit">℃</span>
        </div>
        <div class="wbgt-status" id="wbgt-status">アメダス通信中...</div>
    </div>

    <div class="weather-grid">
        <div class="grid-item"><div class="grid-label">現在の気温</div><div class="grid-value" id="cur-temp">--.-℃</div></div>
        <div class="grid-item"><div class="grid-label">現在の湿度</div><div class="grid-value" id="cur-humidity">--%</div></div>
    </div>

    <div class="footer" id="update-time">気象庁アメダスデータ直接解析中...</div>
</div>

<script>
// 和歌山地方気象台（アメダス観測所コード: 65046）
const AMEDAS_STATION = "65046"; 

function getWbgtLevel(value) {
    const v = parseFloat(value);
    if (v >= 31) return { color: '#e74c3c', text: '危険（運動中止）' };
    if (v >= 28) return { color: '#e67e22', text: '厳重警戒' };
    if (v >= 25) return { color: '#f1c40f', text: '警戒' };
    if (v >= 21) return { color: '#3498db', text: '注意' };
    return { color: '#2ecc71', text: 'ほぼ安全' };
}

function calcWbgt(temp, humidity) {
    return 0.725 * temp + 0.0368 * humidity + 0.00315 * temp * humidity - 3.0;
}

// 気象庁公式の命名ルールに沿って、最新データの日時文字列を生成する関数
function formatJmaTime(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const h = String(date.getHours()).padStart(2, '0');
    // アメダスは毎時00分に確定実況が出るため、分以下は00000固定
    return `${y}${m}${d}${h}0000`;
}

async function updateDashboard() {
    const statusEl = document.getElementById('wbgt-status');
    try {
        // 1. まず気象庁のアメダス最新発表時刻（JST）のJSONを取得（これはCORSブロックされません）
        const timeRes = await fetch("https://www.jma.go.jp/bosai/amedas/data/latest_time.json");
        if (!timeRes.ok) throw new Error();
        const timeJson = await timeRes.json();
        
        // 気象庁側で現在公開されている最新のタイムスタンプ（例: "2024-07-10T14:00:00+09:00"）
        const latestTimeStr = timeJson.replace(/:/g, "").replace(/-/g, "").replace("T", "").substring(0, 10) + "0000";
        
        // 2. その最新時刻の和歌山県アメダス一斉配信JSONをダイレクトに直引き（これもCORSフリーです）
        const dataUrl = `https://www.jma.go.jp/bosai/amedas/data/map/${latestTimeStr}.json`;
        const dataRes = await fetch(dataUrl);
        if (!dataRes.ok) throw new Error();
        const amedasData = await dataRes.json();

        // 3. 和歌山観測所（65046）のピンポイント実況値を抽出
        const stationData = amedasData[AMEDAS_STATION];
        if (!stationData) throw new Error("観測データが見つかりません");

        // 気象庁アメダスの生データ構造から気温と湿度を取り出す
        // ※アメダスの配列構造: temperature[0]が気温、humidity[0]が相対湿度
        const curTemp = parseFloat(stationData.temperature[0]);
        const curHumidity = parseFloat(stationData.humidity[0]);

        if (!isNaN(curTemp) && !isNaN(curHumidity)) {
            // 気象庁HPの画面に表示されている本物の実況値と100%完全同期
            document.getElementById('cur-temp').innerText = `${curTemp.toFixed(1)}℃`;
            document.getElementById('cur-humidity').innerText = `${Math.round(curHumidity)}%`;

            // 本物の実況数値からWBGTをリアルタイム計算
            const curWbgt = calcWbgt(curTemp, curHumidity).toFixed(1);
            
            const numEl = document.getElementById('wbgt-num');
            numEl.innerText = curWbgt;
            numEl.style.setProperty('font-size', '32vh', 'important');

            // 安全レベルに応じた背景色の変更
            const level = getWbgtLevel(curWbgt);
            document.getElementById('wbgt-card').style.backgroundColor = level.color;
            statusEl.innerText = level.text;

            // 取得元の気象庁公式タイムスタンプから時間を表示
            const dataTime = new Date(timeRes.ok ? timeJson : Date.now());
            document.getElementById('time-label').innerText = `気象庁アメダス実況（${dataTime.getHours()}:00時点）`;
            
            const rightNow = new Date();
            document.getElementById('update-time').innerText = `気象庁アメダス直接同期中: ${rightNow.getHours()}:${String(rightNow.getMinutes()).padStart(2,'0')}`;
        } else {
            throw new Error();
        }

    } catch (e) {
        statusEl.innerText = "アメダス再接続中...";
        console.error("アメダス同期失敗:", e);
    }
}

// 起動
updateDashboard();
// アメダスは1時間ごとに更新されるため、5分（300000ms）ごとに自動チェックして最新実況を追尾
setInterval(updateDashboard, 300000);
</script>

</body>
</html>
