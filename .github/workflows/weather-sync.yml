name: JMA & MOE Total Realtime Sync

on:
  schedule:
    - cron: '*/5 * * * *' # 5分ごとに実行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Data and Combine
        run: |
          # --- 1. 環境省から本物のWBGTを取得 ---
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.wbgt.env.go.jp/data/current_zone.csv?_=$(date +%s)" -o wbgt_raw.csv
          WAKAYAMA_MOE=$(grep "^65042," wbgt_raw.csv || echo "")
          REAL_WBGT=$(echo "$WAKAYAMA_MOE" | cut -d',' -f4)

          # --- 2. 気象庁から本物の「現在の気温・湿度」を取得 ---
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt" -o latest_time.txt
          RAW_TIME=$(cat latest_time.txt)
          LATEST_TIME=$(echo "${RAW_TIME}" | sed 's/[-:+T]//g' | cut -c 1-14)
          
          # 正しいURLでアメダスJSONをダウンロード
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/map/${LATEST_TIME}.json" -o amedas_now.json

          # jqコマンドを使って和歌山アメダス(65042)の最新の気温・湿度を抽出
          # 配列の[0]に入っている最新の実況数値を安全に抜き出します
          REAL_TEMP=$(jq -r '."65042".temp[0]' amedas_now.json)
          REAL_HUM=$(jq -r '."65042".humidity[0]' amedas_now.json)

          # --- 3. 2つの本物データを1つのJSONに合体して保存 ---
          echo "{\"wbgt\": \"$REAL_WBGT\", \"temp\": \"$REAL_TEMP\", \"humidity\": \"$REAL_HUM\"}" > wbgt_combined.json
          echo "Combined Data -> WBGT: $REAL_WBGT, Temp: $REAL_TEMP, Hum: $REAL_HUM"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wbgt_combined.json
          git diff --cached --quiet || (git commit -m "Sync Combined Realtime Data" && git push)
