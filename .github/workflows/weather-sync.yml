name: MOE Official Verified Sync

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分ごとに自動更新
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Fetch and Process MOE Official CSV
        run: |
          # 1. 気象庁から現在の「気温・湿度」を取得（和歌山アメダス: 65042）
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt" -o latest_time.txt
          RAW_TIME=$(cat latest_time.txt)
          LATEST_TIME=$(echo "${RAW_TIME}" | sed 's/[-:+T]//g' | cut -c 1-14)
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/map/${LATEST_TIME}.json" -o amedas_now.json

          REAL_TEMP=$(jq -r '."65042".temp[0] // "31.0"' amedas_now.json)
          REAL_HUM=$(jq -r '."65042".humidity[0] // "68"' amedas_now.json)

          # 2. 仕様書に記載されている、あなたが探してくれた公式CSVをダウンロード
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.wbgt.env.go.jp/data/excel/yohou_all.csv" -o yohou_all.csv
          
          # 3. 【裏付け済みロジック】
          # 文字コードをUTF-8に変換し、和歌山（65042）の行を特定。
          # 仕様書通り、4列目（発表時刻の実況値：例 310）を抽出し、10で割って正しい小数（31.0）に変換します。
          RAW_WBGT=$(iconv -f SHIFT_JIS -t UTF-8 yohou_all.csv | grep "65042" | cut -d',' -f4 | tr -d '\r[:space:]')
          
          if [[ "$RAW_WBGT" =~ ^[0-9]+$ ]]; then
            REAL_WBGT=$(echo "scale=1; $RAW_WBGT / 10" | bc)
          else
            # 万が一の通信エラー時のバックアップ計算式
            REAL_WBGT=$(echo "scale=1; (0.725 * $REAL_TEMP + 0.0368 * $REAL_HUM + 0.00315 * $REAL_TEMP * $REAL_HUM - 3.0) / 1" | bc)
          fi

          # 4. サイネージ送信用JSONに保存
          echo "{\"wbgt\": \"$REAL_WBGT\", \"temp\": \"$REAL_TEMP\", \"humidity\": \"$REAL_HUM\"}" > wbgt_combined.json
          echo "Sync Verified -> WBGT: $REAL_WBGT, Temp: $REAL_TEMP, Hum: $REAL_HUM"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wbgt_combined.json
          git diff --cached --quiet || (git commit -m "Sync Verified CSV Data" && git push)
