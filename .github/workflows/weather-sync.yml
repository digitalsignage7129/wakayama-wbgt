name: JMA Amedas Realtime Sync

on:
  schedule:
    - cron: '*/5 * * * *' # 5分ごとに実行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Latest Amedas Data
        run: |
          # 1. 気象庁が公開している「最新のアメダスデータ時間」を取得 (例: 20260710145000)
          curl -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt" -o latest_time.txt
          LATEST_TIME=$(cat latest_time.txt)
          
          # 2. その最新時間の全国アメダスデータJSONをピンポイントでダウンロード
          curl -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/map/${LATEST_TIME}.json" -o amedas_now.json

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add amedas_now.json
          git diff --cached --quiet || (git commit -m "Sync Amedas Realtime Data" && git push)
