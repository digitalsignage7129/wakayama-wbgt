name: JMA & MOE Total Realtime Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Fetch Data and Combine
        run: |
          # 1. 気象庁から現在の「気温・湿度」を取得（和歌山アメダス: 65042）
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt" -o latest_time.txt
          RAW_TIME=$(cat latest_time.txt)
          LATEST_TIME=$(echo "${RAW_TIME}" | sed 's/[-:+T]//g' | cut -c 1-14)
          
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/map/${LATEST_TIME}.json" -o amedas_now.json

          REAL_TEMP=$(jq -r '."65042".temp[0] // "29.9"' amedas_now.json)
          REAL_HUM=$(jq -r '."65042".humidity[0] // "67"' amedas_now.json)

          # 2. 環境省から本物のWBGTを取得（環境省和歌山コード: 62081）
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.wbgt.env.go.jp/data/current_zone.csv?_=$(date +%s)" -o wbgt_raw.csv
          
          # 【最終解決】Bashの切り出しではなく、Pythonの標準CSVライブラリをその場で動かします。
          # これにより、空欄（,,）が何個あろうが、カンマ区切りの「正確な4番目の要素」を絶対にズレずに抽出します。
          REAL_WBGT=$(python3 -c "
          import csv
          with open('wbgt_raw.csv', mode='r', encoding='utf-8', errors='ignore') as f:
              reader = csv.reader(f)
              for row in reader:
                  # 行の中に和歌山コード(62081)が含まれているか探す
                  if '62081' in row:
                      idx = row.index('62081')
                      # 62081の入っている位置から3つ隣（4番目の要素）が確実な実況値
                      if idx + 3 < len(row):
                          print(row[idx + 3].strip())
                          break
          " || echo "")

          # 数字（整数または小数）であるか厳密にチェック。
          # 条件を満たさない（空文字やエラー文字）場合のみ、最終手段としてアメダスから「計算値（小数点第1位に丸め）」を作ります。
          if [[ ! "$REAL_WBGT" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "MOE CSV parse mismatched. Calculating from Amedas..."
            REAL_WBGT=$(echo "scale=1; (0.725 * $REAL_TEMP + 0.0368 * $REAL_HUM + 0.00315 * $REAL_TEMP * $REAL_HUM - 3.0) / 1" | bc)
          fi

          # 3. 1つのJSONに合体して保存
          echo "{\"wbgt\": \"$REAL_WBGT\", \"temp\": \"$REAL_TEMP\", \"humidity\": \"$REAL_HUM\"}" > wbgt_combined.json
          echo "Generated -> WBGT: $REAL_WBGT, Temp: $REAL_TEMP, Hum: $REAL_HUM"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wbgt_combined.json
          git diff --cached --quiet || (git commit -m "Sync Combined Realtime Data" && git push)
