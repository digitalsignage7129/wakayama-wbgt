name: MOE Official CSV Realtime Sync

on:
  schedule:
    - cron: '*/10 * * * *'  # 10分ごとに自動で最新CSVをチェック
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Fetch and Process MOE Official CSV
        run: |
          # 1. 気象庁から現在の「気温・湿度」を取得（和歌山アメダス: 65042）
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/latest_time.txt" -o latest_time.txt
          RAW_TIME=$(cat latest_time.txt)
          LATEST_TIME=$(echo "${RAW_TIME}" | sed 's/[-:+T]//g' | cut -c 1-14)
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.jma.go.jp/bosai/amedas/data/map/${LATEST_TIME}.json" -o amedas_now.json

          REAL_TEMP=$(jq -r '."65042".temp[0] // "31.0"' amedas_now.json)
          REAL_HUM=$(jq -r '."65042".humidity[0] // "68"' amedas_now.json)

          # 2. 環境省のダウンロードシステムから和歌山（65042）の最新CSVを直接取得
          # ※このダウンロードページが内部で叩いている最新CSVの取得URLを狙います
          curl -s -H "User-Agent: Mozilla/5.0" "https://www.wbgt.env.go.jp/data/excel/yohou_all.csv" -o moe_raw.csv
          
          # Shift_JISからUTF-8に変換し、和歌山の行（65042）の最新データ（4列目の実況値）を抽出
          # 310 という整数を 10 で割って「31.0」という正しい小数に戻します
          RAW_WBGT=$(iconv -f SHIFT_JIS -t UTF-8 moe_raw.csv | grep "65042" | cut -d',' -f4 | tr -d '\r[:space:]')
          
          if [[ "$RAW_WBGT" =~ ^[0-9]+$ ]]; then
            REAL_WBGT=$(echo "scale=1; $RAW_WBGT / 10" | bc)
          else
            # 万が一取得エラーが起きた場合のバックアップ計算
            REAL_WBGT=$(echo "scale=1; (0.725 * $REAL_TEMP + 0.0368 * $REAL_HUM + 0.00315 * $REAL_TEMP * $REAL_HUM - 3.0) / 1" | bc)
          fi

          # 3. サイネージ用のJSONを生成
          echo "{\"wbgt\": \"$REAL_WBGT\", \"temp\": \"$REAL_TEMP\", \"humidity\": \"$REAL_HUM\"}" > wbgt_combined.json
          echo "Generated -> WBGT: $REAL_WBGT, Temp: $REAL_TEMP, Hum: $REAL_HUM"

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wbgt_combined.json
          git diff --cached --quiet || (git commit -m "Sync Official CSV Data" && git push)
